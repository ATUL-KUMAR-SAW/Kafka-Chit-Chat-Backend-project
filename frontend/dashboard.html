<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cluster Telemetry Dashboard</title>
    <link href="/src/index.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,1,0" />
    <script type="module" src="/src/dashboard.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace']
                    },
                    colors: {
                        igBlack: '#000000',
                        igBorder: '#262626',
                        igGrayText: '#A8A8A8',
                        igHover: '#1A1A1A'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #000000;
            color: #F5F5F5;
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #555; }
        
        .log-row {
            transition: all 0.2s ease;
        }
        .log-row:hover {
            background-color: #0f0f0f;
        }
        
        /* Modern iOS-style toggle */
        .toggle-checkbox:checked { right: 0; border-color: #ef4444; }
        .toggle-checkbox:checked + .toggle-label { background-color: #ef4444; }
        .toggle-checkbox { right: 4px; z-index: 1; border-color: #4b5563; transition: all 0.3s; }
        .toggle-label { width: 2.5rem; height: 1.25rem; background-color: #374151; border-radius: 9999px; transition: all 0.3s; cursor: pointer; }

        .animate-fade-in {
            animation: fadeIn 0.2s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="antialiased overflow-hidden flex flex-col">
    <!-- Premium Header -->
    <header class="h-[80px] w-full flex items-center justify-between border-b border-igBorder px-6 flex-shrink-0 bg-igBlack/90 backdrop-blur-xl z-20 box-border">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-purple-500/20 border border-purple-500/30">
                <span class="material-symbols-rounded text-white">monitoring</span>
            </div>
            <div>
                <h1 class="text-xl font-bold text-white tracking-wide flex items-center gap-2">
                    Cluster Telemetry
                </h1>
                <p class="text-xs text-igGrayText mt-0.5"><a href="/" class="hover:text-white transition underline decoration-igBorder hover:decoration-white underline-offset-4 flex items-center gap-1"><span class="material-symbols-rounded text-[14px]">arrow_back</span> Return to Chat</a></p>
            </div>
        </div>
        
        <div class="flex items-center gap-5">
            <!-- Toggle -->
            <div class="flex items-center gap-2 mr-2">
                <span class="text-xs text-igGrayText font-semibold uppercase tracking-wider">Errors Only</span>
                <div class="relative inline-block w-10 align-middle select-none transition duration-200 ease-in ml-1">
                    <input type="checkbox" name="toggle" id="filter-errors" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer top-[0px]"/>
                    <label for="filter-errors" class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-600 cursor-pointer"></label>
                </div>
            </div>

            <!-- Status Badge -->
            <div id="status-indicator" class="flex items-center justify-center min-w-[100px] gap-2 border px-4 py-1.5 rounded-full font-bold transition-colors bg-gray-800/50 border-gray-700">
                <span class="relative flex h-2.5 w-2.5">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-gray-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-gray-500"></span>
                </span>
                <span class="text-gray-400 tracking-wider text-[11px]">CONNECTING</span>
            </div>

            <button id="clear-btn" class="flex items-center justify-center w-10 h-10 rounded-xl bg-igHover hover:bg-[#222] text-igGrayText hover:text-white border border-igBorder transition-all hover:scale-105 active:scale-95 shadow-sm" title="Clear Logs">
                <span class="material-symbols-rounded text-[20px]">delete_sweep</span>
            </button>
        </div>
    </header>
    
    <!-- Table Headers -->
    <div class="w-full bg-[#0a0a0c] border-b border-igBorder px-8 py-3 flex text-[11px] font-bold text-igGrayText uppercase tracking-widest z-10 shadow-sm relative">
        <div class="w-32 flex-shrink-0 flex items-center gap-1.5"><span class="material-symbols-rounded text-[14px]">schedule</span> TIME</div>
        <div class="w-28 flex-shrink-0 flex items-center gap-1.5"><span class="material-symbols-rounded text-[14px]">dns</span> NODE</div>
        <div class="w-24 flex-shrink-0 flex items-center gap-1.5"><span class="material-symbols-rounded text-[14px]">label</span> LEVEL</div>
        <div class="flex-1 flex items-center gap-1.5"><span class="material-symbols-rounded text-[14px]">subject</span> MESSAGE STREAM</div>
    </div>

    <!-- Logs Container -->
    <div class="flex-1 overflow-y-auto custom-scrollbar bg-igBlack pb-6" id="log-container">
        <!-- Empty State -->
        <div class="flex flex-col items-center justify-center h-full text-igGrayText opacity-50" id="empty-state">
            <span class="material-symbols-rounded text-6xl mb-4 animate-pulse">hourglass_empty</span>
            <p class="font-medium tracking-wide">Waiting for telemetry data...</p>
        </div>
    </div>
</body>
</html>
